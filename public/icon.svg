<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1729"/>
      <stop offset="100%" style="stop-color:#0a1020"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="40%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#e879f9"/>
    </linearGradient>
    <linearGradient id="stem" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#a3e635"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" style="stop-color:#e879f9" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle glow behind leaf -->
  <ellipse cx="256" cy="230" rx="120" ry="130" fill="url(#glow)"/>
  <!-- Main leaf shape -->
  <path d="M256 100 C320 130, 380 200, 370 290 C360 340, 310 370, 256 360 C202 370, 152 340, 142 290 C132 200, 192 130, 256 100 Z" fill="url(#leaf)" opacity="0.9"/>
  <!-- Leaf center vein -->
  <path d="M256 120 C256 180, 256 260, 256 350" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
  <!-- Leaf side veins -->
  <path d="M256 180 C230 195, 200 200, 185 210" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
  <path d="M256 180 C282 195, 312 200, 327 210" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
  <path d="M256 230 C225 250, 190 258, 170 268" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
  <path d="M256 230 C287 250, 322 258, 342 268" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
  <path d="M256 280 C232 298, 205 305, 190 315" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
  <path d="M256 280 C280 298, 307 305, 322 315" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
  <!-- Stem -->
  <path d="M256 355 C256 375, 250 400, 248 425" fill="none" stroke="url(#stem)" stroke-width="8" stroke-linecap="round"/>
</svg>
